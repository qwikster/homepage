<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Optimizer</title>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAUy0_Xmdu4_NVJIVgXJJ0cGLDft-tCd7E&libraries=places"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .address { width: 400px; }
    #map { height: 500px; width: 100%; margin-top: 20px; }
    #routeSummary { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Route Optimizer</h2>
  <label for="timeLimit">Total Available Time (minutes):</label>
  <input type="number" id="timeLimit" value="180"><br>
  <label for="startLocation">Start Location:</label>
  <input class="address" id="startLocation" placeholder="Enter start location" /><br>
  <button onclick="addLocationInput(false)">Add Core Location</button>
  <button onclick="addLocationInput(true)">Add Bonus Location</button>
  <div id="locations"></div>
  <button onclick="calculateRoute()">Optimize Route</button>
  <div id="map"></div>
  <div id="routeSummary"></div>

  <script>
    let map, geocoder;

    function initMap() {
      geocoder = new google.maps.Geocoder();
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 37.7749, lng: -122.4194 },
        zoom: 10
      });

      upgradeAutocompleteInputs();

      map.addListener("click", (e) => {
        const latlng = { lat: e.latLng.lat(), lng: e.latLng.lng() };
        geocoder.geocode({ location: latlng }, (results, status) => {
          if (status === "OK" && results[0]) {
            addLocationInput(false, results[0].formatted_address);
          }
        });
      });
    }

    function upgradeAutocompleteInputs() {
      document.querySelectorAll('.address').forEach(input => {
        if (!input.dataset.bound) {
          new google.maps.places.Autocomplete(input);
          input.dataset.bound = true;
        }
      });
    }

    function addLocationInput(isBonus = false, prefilled = "") {
      const div = document.createElement("div");
      div.dataset.bonus = isBonus;
      div.innerHTML = `
        <input class="address" placeholder="Address" value="${prefilled}" />
        <input type="number" placeholder="Task Time (minutes)" class="taskTime" />
        <input type="number" placeholder="Point Value" class="pointValue" />
        <button onclick="this.parentNode.remove()">Remove</button><br><br>
      `;
      document.getElementById("locations").appendChild(div);
      upgradeAutocompleteInputs();
    }

    async function calculateRoute() {
      const startLocation = document.getElementById("startLocation").value.trim();
      const timeLimit = parseInt(document.getElementById("timeLimit").value);
      if (!startLocation || isNaN(timeLimit)) {
        alert("Start location and time limit are required.");
        return;
      }

      const coreLocations = [ { address: startLocation, taskTime: 0, pointValue: 0 } ];
      const bonusLocations = [];

      document.querySelectorAll("#locations > div").forEach(div => {
        const addressInput = div.querySelector(".address");
        const taskInput = div.querySelector(".taskTime");
        const pointInput = div.querySelector(".pointValue");

        const address = addressInput?.value.trim();
        const taskTime = parseInt(taskInput?.value);
        const pointValue = parseInt(pointInput?.value);
        const isBonus = div.dataset.bonus === "true";

        if (address && !isNaN(taskTime) && !isNaN(pointValue)) {
          const entry = { address, taskTime, pointValue };
          (isBonus ? bonusLocations : coreLocations).push(entry);
        }
      });

      if (coreLocations.length < 2) {
        alert("Enter at least one valid core destination.");
        return;
      }

      const service = new google.maps.DistanceMatrixService();
      const allLocations = [...coreLocations, ...bonusLocations];
      const addresses = allLocations.map(l => l.address);

      service.getDistanceMatrix({
        origins: addresses,
        destinations: addresses,
        travelMode: 'DRIVING'
      }, (response, status) => {
        if (status !== 'OK') {
          alert("Distance Matrix failed");
          return;
        }

        const matrix = response.rows;
        const n = coreLocations.length;
        const dp = Array(1 << n).fill().map(() => Array(n).fill(Infinity));
        const score = Array(1 << n).fill().map(() => Array(n).fill(0));
        dp[1][0] = 0;

        for (let mask = 1; mask < (1 << n); mask++) {
          for (let u = 0; u < n; u++) {
            if (!(mask & (1 << u))) continue;
            for (let v = 0; v < n; v++) {
              if (mask & (1 << v)) continue;
              const travel = matrix[u].elements[v];
              if (travel.status !== 'OK') continue;
              const travelTime = travel.duration.value / 60;
              const totalTime = dp[mask][u] + travelTime + coreLocations[v].taskTime;
              const totalScore = score[mask][u] + coreLocations[v].pointValue;
              const nextMask = mask | (1 << v);
              if (totalTime <= timeLimit && totalScore > score[nextMask][v]) {
                dp[nextMask][v] = totalTime;
                score[nextMask][v] = totalScore;
              }
            }
          }
        }

        let maxScore = 0, bestEnd = 0, bestMask = 0;
        for (let mask = 0; mask < (1 << n); mask++) {
          for (let u = 0; u < n; u++) {
            if (score[mask][u] > maxScore) {
              maxScore = score[mask][u];
              bestEnd = u;
              bestMask = mask;
            }
          }
        }

        const path = [];
        let u = bestEnd, mask = bestMask;
        while (mask > 1) {
          path.push(u);
          for (let v = 0; v < n; v++) {
            if ((mask & (1 << v)) && v !== u) {
              const travel = matrix[v].elements[u].duration.value / 60;
              const prevTime = dp[mask][u] - travel - coreLocations[u].taskTime;
              if (Math.abs(dp[mask ^ (1 << u)][v] - prevTime) < 1e-6) {
                u = v;
                mask ^= (1 << u);
                break;
              }
            }
          }
        }
        path.push(0);
        path.reverse();

        let usedTime = dp[bestMask][bestEnd];
        let spareTime = timeLimit - usedTime;
        const coreAddresses = path.map(i => coreLocations[i].address);

        const bonusUsed = [];
        let lastCoreIndex = path[path.length - 1];
        bonusLocations.forEach((b, i) => {
          const idx = coreLocations.length + i;
          const travel = matrix[lastCoreIndex].elements[idx];
          if (travel.status !== 'OK') return;
          const travelTime = travel.duration.value / 60;
          if (travelTime + b.taskTime <= spareTime) {
            bonusUsed.push(b);
            spareTime -= (travelTime + b.taskTime);
            lastCoreIndex = idx;
          }
        });

        showSummary(coreAddresses, maxScore, bonusUsed);
        displayRoute(coreAddresses.concat(bonusUsed.map(b => b.address)));
      });
    }

    function showSummary(route, points, bonus) {
      let summary = `Optimal Route with ${points} Points (within limit):\n\n`;
      route.forEach((addr, i) => summary += `${i + 1}. ${addr}\n`);
      if (bonus.length > 0) {
        summary += "\nBonus Locations (optional):\n";
        bonus.forEach(b => {
          summary += `- ${b.address} (${b.pointValue} pts, ${b.taskTime} min)\n`;
        });
      }
      document.getElementById("routeSummary").textContent = summary;
    }

    function displayRoute(route) {
      const directionsService = new google.maps.DirectionsService();
      const directionsRenderer = new google.maps.DirectionsRenderer();
      directionsRenderer.setMap(map);

      directionsService.route({
        origin: route[0],
        destination: route[route.length - 1],
        waypoints: route.slice(1, -1).map(loc => ({ location: loc, stopover: true })),
        travelMode: 'DRIVING'
      }, (result, status) => {
        if (status === 'OK') {
          directionsRenderer.setDirections(result);
          const bounds = new google.maps.LatLngBounds();
          result.routes[0].overview_path.forEach(p => bounds.extend(p));
          map.fitBounds(bounds);
        }
      });
    }

    window.onload = initMap;
  </script>
</body>
</html>
