<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Optimizer</title>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAUy0_Xmdu4_NVJIVgXJJ0cGLDft-tCd7E&libraries=places"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #e0e0e0;
    }
    main {
      padding: 20px;
    }
    input, button {
      margin: 8px 0;
      padding: 10px;
      width: 100%;
      max-width: 400px;
      background: #1e1e1e;
      color: #ffffff;
      border: 1px solid #444;
      border-radius: 4px;
    }
    button {
      background-color: #333;
      cursor: pointer;
    }
    #map {
      height: 400px;
      width: 100%;
      margin: 20px 0;
    }
    #locations > div {
      margin-bottom: 10px;
    }
    #routeSummary {
      white-space: pre-wrap;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h2>Route Optimizer</h2>
    <label for="timeLimit">Total Time (minutes):</label>
    <input type="number" id="timeLimit" value="180">
    <label for="startLocation">Start Location:</label>
    <input class="address" id="startLocation" placeholder="Enter start location">
    <button onclick="addLocationInput()">Add Location</button>
    <div id="locations"></div>
    <button onclick="submitLocations()">Submit for Optimization</button>
    <div id="map"></div>
    <div id="routeSummary"></div>
  </main>

  <script>
    let map, geocoder;

    function initMap() {
      geocoder = new google.maps.Geocoder();
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 37.7749, lng: -122.4194 },
        zoom: 10,
        styles: [ { elementType: 'geometry', stylers: [ { color: '#1e1e1e' } ] } ]
      });

      upgradeAutocompleteInputs();

      map.addListener("click", (e) => {
        const latlng = { lat: e.latLng.lat(), lng: e.latLng.lng() };
        geocoder.geocode({ location: latlng }, (results, status) => {
          if (status === "OK" && results[0]) {
            addLocationInput(results[0].formatted_address);
          }
        });
      });
    }

    function upgradeAutocompleteInputs() {
      document.querySelectorAll('.address').forEach(input => {
        if (!input.dataset.bound) {
          new google.maps.places.Autocomplete(input);
          input.dataset.bound = true;
        }
      });
    }

    function addLocationInput(prefilled = "") {
      const div = document.createElement("div");
      div.innerHTML = `
        <input class="address" placeholder="Address" value="${prefilled}" />
        <input type="number" placeholder="Task Time (minutes)" class="taskTime" />
        <input type="number" placeholder="Point Value" class="pointValue" />
        <button onclick="this.parentNode.remove()">Remove</button>
      `;
      document.getElementById("locations").appendChild(div);
      upgradeAutocompleteInputs();
    }

    async function submitLocations() {
      const startLocation = document.getElementById("startLocation").value.trim();
      const timeLimit = parseInt(document.getElementById("timeLimit").value);

      const locations = [];
      document.querySelectorAll("#locations > div").forEach(div => {
        const address = div.querySelector(".address")?.value.trim();
        const taskTime = parseInt(div.querySelector(".taskTime")?.value);
        const pointValue = parseInt(div.querySelector(".pointValue")?.value);
        if (address && !isNaN(taskTime) && !isNaN(pointValue)) {
          locations.push({ address, taskTime, pointValue });
        }
      });

      if (!startLocation || isNaN(timeLimit) || locations.length === 0) {
        alert("Start location, time limit, and at least one destination are required.");
        return;
      }

      const payload = JSON.stringify({ startLocation, timeLimit, locations });
      try {
        const res = await fetch("https://596d-2605-59c8-2612-2f10-00-86a.ngrok-free.app/optimize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: payload
        });
        const data = await res.json();
        showSummary(data.route, data.totalPoints, data.bonus);
        displayRoute(data.route);
      } catch (err) {
        alert("Error communicating with the server.");
      }
    }

    function showSummary(route, points, bonus) {
      let summary = `Route Score: ${points} points\n\nRoute:`;
      route.forEach((addr, i) => summary += `\n${i + 1}. ${addr}`);
      if (bonus && bonus.length > 0) {
        summary += "\n\nBonus Locations:";
        bonus.forEach(b => summary += `\n- ${b.address} (${b.pointValue} pts)`);
      }
      document.getElementById("routeSummary").textContent = summary;
    }

    function displayRoute(route) {
      const directionsService = new google.maps.DirectionsService();
      const directionsRenderer = new google.maps.DirectionsRenderer();
      directionsRenderer.setMap(map);

      directionsService.route({
        origin: route[0],
        destination: route[route.length - 1],
        waypoints: route.slice(1, -1).map(loc => ({ location: loc, stopover: true })),
        travelMode: 'DRIVING'
      }, (result, status) => {
        if (status === 'OK') {
          directionsRenderer.setDirections(result);
          const bounds = new google.maps.LatLngBounds();
          result.routes[0].overview_path.forEach(p => bounds.extend(p));
          map.fitBounds(bounds);
        }
      });
    }

    window.onload = initMap;
  </script>
</body>
</html>
